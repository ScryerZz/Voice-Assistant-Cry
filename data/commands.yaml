skills:
  assistant_control:
    description: "Assistant Commands"
    commands:
      # Terminate Assistant
      - patterns:
          - "выключись"
          - "останови работу"
          - "заверши программу"
          - "cry stop"
          - "shut down"
          - "terminate"
        action: "assistant_control.shutdown_assistant"
        response: 
          ru: "Останавливает ассистента"
          en: "Stopping assistant"
      # Change Language
      - patterns:
          - "измени язык"
          - "поменяй язык"
          - "сменить язык"
          - "change language"
          - "switch language"
          - "set language"
        action: assistant_control.change_language
        response:
          ru: "Язык обновлён."
          en: "Language changed."

  assistant_info:
    description: "Справка и диагностика"
    commands:
      - patterns:
          - "что ты умеешь"
          - "что умеешь"
          - "какие команды"
          - "список команд"
          - "помощь"
          - "help"
          - "what can you do"
          - "commands"
        action: assistant_info.list_capabilities
        response:
          ru: "Показываю возможности."
          en: "Showing capabilities."

      - patterns:
          - "примеры команд"
          - "покажи примеры команд"
          - "что можно сказать"
          - "examples"
          - "example commands"
        action: assistant_info.show_example_commands
        response:
          ru: "Показываю примеры команд."
          en: "Showing command examples."

      - patterns:
          - "проверь ассистента"
          - "диагностика ассистента"
          - "проверка системы ассистента"
          - "diagnostics"
          - "check assistant"
          - "assistant diagnostics"
        action: assistant_info.run_diagnostics
        response:
          ru: "Запускаю диагностику."
          en: "Running diagnostics."

  logs:
    description: "Журнал событий"
    commands:
      - patterns:
          - "где журнал"
          - "статус журнала"
          - "покажи журнал"
          - "log status"
          - "show log"
        action: logs.log_status
        response:
          ru: "Проверяю журнал."
          en: "Checking log."

      - patterns:
          - "последние ошибки"
          - "последние записи журнала"
          - "что в журнале"
          - "recent logs"
          - "last errors"
        action: logs.recent_logs
        response:
          ru: "Читаю последние записи журнала."
          en: "Reading recent log entries."

      - patterns:
          - "очисти журнал"
          - "удали журнал"
          - "clear log"
          - "clear logs"
        action: logs.clear_logs
        response:
          ru: "Очищаю журнал."
          en: "Clearing log."

  history:
    description: "История команд"
    commands:
      - patterns:
          - "история команд"
          - "сколько команд"
          - "статус истории"
          - "command history"
          - "history status"
        action: history.history_status
        response:
          ru: "Проверяю историю команд."
          en: "Checking command history."

      - patterns:
          - "последние команды"
          - "что я говорил"
          - "что ты распознал"
          - "recent commands"
          - "what did I say"
        action: history.recent_history
        response:
          ru: "Читаю последние команды."
          en: "Reading recent commands."

      - patterns:
          - "очисти историю команд"
          - "удали историю команд"
          - "clear command history"
          - "clear history"
        action: history.clear_history
        response:
          ru: "Очищаю историю команд."
          en: "Clearing command history."
  
