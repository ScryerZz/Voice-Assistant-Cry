  system:
    description: "Системные команды"
    commands:
      # === Browser ===
      - patterns:
          - "открой браузер"
          - "запусти браузер"
          - "браузер открой"
          - "включи браузер"
          - "chrome открой"
          - "google открой"
          - "интернет открой"
          - "open browser"
          - "launch browser"
          - "open google"
          - "open chrome"
          - "launch chrome"
          - "start chrome"
          - "run browser"
        action: system.open_browser
        response:
          ru: "Открываю браузер."
          en: "Opening browser."

      # === Shutdown ===
      - patterns:
          - "выключи компьютер"
          - "выключи пк"
          - "отключи компьютер"
          - "заверши работу"
          - "заверши систему"
          - "shutdown computer"
          - "turn off computer"
          - "power off"
          - "turn off pc"
          - "shut down the system"
        action: system.shutdown
        response:
          ru: "Выключаю компьютер."
          en: "Shutting down."

      # === Restart ===
      - patterns:
          - "перезагрузи компьютер"
          - "перезагрузи пк"
          - "рестартни компьютер"
          - "перезагрузи систему"
          - "restart computer"
          - "restart pc"
          - "restart"
          - "restart the system"
        action: system.restart
        response:
          ru: "Перезагружаю компьютер."
          en: "Restarting computer."

      # === Cancel Scheduled Shutdown/Restart ===
      - patterns:
          - "отмени выключение"
          - "отмена выключения"
          - "отмени перезагрузку"
          - "отмена перезагрузки"
          - "отмени завершение работы"
          - "cancel shutdown"
          - "abort shutdown"
          - "cancel restart"
          - "abort restart"
        action: system.cancel_shutdown
        response:
          ru: "Отменяю запланированное выключение или перезагрузку."
          en: "Canceling scheduled shutdown or restart."

      # === Sleep ===
      - patterns:
          - "усыпи компьютер"
          - "усыпи пк"
          - "спящий режим"
          - "усыпи систему"
          - "computer to sleep"
          - "pc to sleep"
          - "sleep mode"
          - "system to sleep"
        action: system.sleep
        response:
          ru: "Усыпляю компьютер."
          en: "Starting sleep mode."
      
      # === Lock Screen ===
      - patterns:
          - "заблокируй экран"
          - "заблокируй компьютер"
          - "блокировка экрана"
          - "заблокировать"
          - "lock screen"
          - "lock computer"
          - "lock the screen"
        action: system.lock_screen
        response:
          ru: "Блокирую экран..."
          en: "Locking screen..."

      # === Search online ===
      - patterns:
          - "найди в интернете"
          - "поиск в интернете"
          - "искать в интернете"
          - "поищи в интернете"
          - "поищи онлайн"
          - "поиск онлайн"
          - "search"
          - "search online"
          - "search in internet"
          - "find in the internet"
          - "find online"
          - "google it"
          - "look it up"
          - "search for"
          - "search about"
        action: search_web.search_internet
        response:
          ru: "Секунду, ищу информацию..."
          en: "One moment, searching online..."
  
  time_date:
    description: "Время и дата"
    commands:
      - patterns:
          # ==== ВРЕМЯ ====
          - "сколько времени"
