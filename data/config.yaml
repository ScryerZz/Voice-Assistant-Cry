voice_enabled: false
voice_engine: silero
voice_speed: 180
voice_volume: 1.0
voice_gender: female
voice_speaker: aidar
language: ru-RU
wake_word: край
wake_words:
  ru:
  - край
  en:
  - cry
recognition:
  online_listen_seconds: 5
  offline_listen_timeout_seconds: 8
  audio_queue_timeout_seconds: 1.0
  recover_after_errors: 3
  miss_threshold: 3
  repeat_prompt_enabled: true
matcher:
  threshold: 68
  partial_threshold: 78
  smalltalk_threshold: 45
  min_partial_length: 5
assistant:
  name: Cry
  default_language: ru
  voice: default
  personality: friendly
  ai_enabled: true
  yandexgpt_api_key: ''
  yandex_folder_id: ''
debug: true
logging:
  dir: data/logs
  file: assistant.log
  level: INFO
  max_bytes: 1000000
  backup_count: 5
offline_mode: true
auto_switch_mode: false
first_run_completed: true
startup:
  launch_on_login: false
  start_minimized_to_tray: true
  minimize_to_tray_on_close: true
  start_assistant_on_launch: false
privacy:
  redact_secrets_in_exports: true
  include_logs_in_reports: true
  include_history_in_reports: false
  crash_summary_lines: 80
profiles:
  active: ''
  items: {}
paths:
  datasets: data/commands.yaml
  user_commands: data/user_commands.yaml
  tts_models: data/models/tts
  stt_models: data/models/stt
  cache_dir: data/cache
  database: data/assistant.sqlite3
silero:
  ru_speakers:
  - aidar
  - baya
  - kseniya
  - xenia
  - eugene
  en_speakers:
  - en_0
  - en_1
  - en_2
  sample_rate: 48000
  use_cuda: true
weather:
  api_key: ''
  default_city: Казань
news:
  api_key: ''
system_power:
  shutdown_delay_seconds: 30
safety:
  confirm_dangerous_commands: true
  confirmation_timeout_seconds: 15
  dangerous_min_score: 90
  dangerous_actions:
  - apps.close_app
  - apps.close_discord
  - apps.close_flstudio
  - apps.close_msexcel
  - apps.close_mspowerpoint
  - apps.close_msword
  - apps.close_steam
  - apps.close_telegram
  - apps.close_yamusic
  - history.clear_history
  - logs.clear_logs
  - notes.clear_notes
  - system.restart
  - system.shutdown
  - system.sleep
  - system_control.clean_system
  - system_control.clear_downloads
  - system_control.clear_recycle_bin
  - system_control.clear_temp
apps:
  telegram:
    path: C:/Users/coderzxc/AppData/Roaming/Telegram Desktop/Telegram.exe
    process: Telegram.exe
  yamusic:
    path: ''
    process: Яндекс Музыка.exe
  discord:
    path: C:/Users/coderzxc/AppData/Local/Discord/Update.exe
    process: Discord.exe
  steam:
    path: C:/Program Files (x86)/Steam/steam.exe
    process: steam.exe
  flstudio:
    path: ''
    process: FL64.exe
  msword:
    path: ''
    process: WINWORD.EXE
  msexcel:
    path: ''
    process: EXCEL.EXE
  mspowerpoint:
    path: ''
    process: POWERPNT.EXE
